version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: >
      bash -lc "pip install --upgrade pip && pip install -e .[dev] &&
      uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/knowledge_copilot
    depends_on:
      - qdrant
      - postgres

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
